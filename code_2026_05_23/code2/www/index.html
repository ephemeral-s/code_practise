<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到我的网站</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 全局背景：采用温和的渐变色 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 主界面卡片容器 */
        .main-container {
            background-color: #ffffff;
            padding: 3rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        /* 标题样式 */
        .main-container h1 {
            color: #333333;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        /* 辅助描述文字 */
        .main-container p {
            color: #666666;
            font-size: 1rem;
            margin-bottom: 2.5rem;
            line-height: 1.5;
        }

        /* 核心切换页面按钮（a标签） */
        .switch-btn {
            display: inline-block;
            text-decoration: none;
            background-color: #4f46e5; /* 现代感十足的靛蓝色 */
            color: #ffffff;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease; /* 平滑的过渡动画 */
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        /* 鼠标悬停（Hover）时的互动效果 */
        .switch-btn:hover {
            background-color: #4338ca; /* 颜色加深 */
            transform: translateY(-2px); /* 向上微动 */
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
        }

        /* 按钮被点击瞬间的效果 */
        .switch-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>欢迎来到主界面</h1>
        <p>这是一个极简、响应式的网页模板。点击下方按钮即可探索新世界。</p>
        
        <!-- 切换页面的按钮：请将 target_page.html 替换为你想要跳转的页面链接 -->
        <a href="target_page.html" class="switch-btn">进入下一页</a>
    </div>

</body>
</html>
